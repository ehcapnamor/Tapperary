<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>Tipperary — Tirage</title>
<meta name="description" content="Tirage virtuel des tuiles Paysage pour le jeu de société Tipperary">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1E2420">
<link rel="apple-touch-icon" href="icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Tipperary">
<style>
  :root{
    --bg:#1E2420; --surface:#262E29; --surface-2:#2F3931; --line:#3E4A41;
    --text:#EDEAD9; --text-dim:#A9B0A2;
    --moss:#7FA65E; --wheat:#D3A24C; --stone:#9C8468; --loch:#4A6B7A; --circle:#9B9B8F;
    --danger:#B5573E;
    --f-display: Georgia, 'Palatino Linotype', 'Book Antiqua', serif;
    --f-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    --f-mono: 'SF Mono', SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; background:var(--bg); color:var(--text); font-family:var(--f-body); height:100%; }
  body{ padding:.6rem; -webkit-tap-highlight-color:transparent; }
  .wrap{ max-width:820px; margin:0 auto; }
  .disp{ font-family:var(--f-display); }
  .mono{ font-family:var(--f-mono); }

  .topbar{ display:flex; align-items:center; gap:.35rem; background:var(--surface); border:1px solid var(--line);
    border-radius:12px; padding:.4rem .5rem; margin-bottom:.5rem; overflow-x:auto; }
  .spacer{ flex:1; min-width:.3rem; }
  .topbar-title{ font-weight:700; font-size:.86rem; white-space:nowrap; flex-shrink:0; padding-left:.2rem; }
  .topbar-sub{ font-family:var(--f-body); font-weight:400; color:var(--text-dim); font-size:.76rem; }
  .icon-btn{ width:2rem; height:2rem; border-radius:8px; border:1px solid var(--line); background:var(--surface-2);
    color:var(--text); display:flex; align-items:center; justify-content:center; font-size:.95rem; cursor:pointer; flex-shrink:0; padding:0; }
  .icon-btn:disabled{ opacity:.3; }
  .icon-btn:active{ background:#374238; }

  .btn{ display:inline-flex; align-items:center; justify-content:center; gap:.35rem; background:var(--surface-2); color:var(--text);
    border:1px solid var(--line); border-radius:9px; padding:.5rem .75rem; font-size:.8rem; cursor:pointer; font-family:var(--f-body); }
  .btn:active{ background:#374238; }
  .btn:disabled{ opacity:.35; }
  .btn-danger{ border-color:var(--danger); color:#F0C6B9; }
  .btn-primary{ background:var(--moss); color:#12180F; border-color:var(--moss); font-weight:700; }

  .round-advance-btn{ width:100%; text-align:center; padding:.6rem; font-size:.8rem; margin-bottom:.5rem; line-height:1.3; }
  .round-advance-btn:disabled{ opacity:.55; cursor:not-allowed; }
  .round-advance-btn.warn{ border-color:var(--danger); color:#F0C6B9; }

  .zones{ display:grid; grid-template-columns:repeat(2,1fr); gap:.45rem; }
  @media(min-width:640px){ .zones{ grid-template-columns:repeat(3,1fr); } }
  @media(min-width:900px){ .zones{ grid-template-columns:repeat(5,1fr); } }

  .zone{ background:var(--surface); border:1px solid var(--line); border-left:4px solid var(--zc);
    border-radius:10px; padding:.5rem .55rem; display:flex; flex-direction:column; gap:.32rem; transition:opacity .15s; }
  .zone.closed{ opacity:.5; }
  .zone h3{ margin:0; font-family:var(--f-display); font-size:.78rem; font-weight:700; display:flex; align-items:center; gap:.32rem; }
  .zone h3 .check{ margin-left:auto; color:var(--text-dim); font-size:.75rem; }
  .zone-icon{ display:inline-flex; flex-shrink:0; }
  .zi{ width:17px; height:19.1px; display:block; }

  .tickets{ display:flex; flex-direction:column; gap:.28rem; }
  .ticket{ display:flex; align-items:center; justify-content:space-between; gap:.35rem;
    background:linear-gradient(180deg,#F4EEDC,#E7DDC0); color:#2A2920; border-radius:7px;
    padding:.26rem .38rem .26rem .5rem; box-shadow:0 1px 0 rgba(0,0,0,.28); border:1px solid rgba(0,0,0,.15); }
  .ticket .n{ font-family:var(--f-mono); font-weight:800; font-size:.98rem; }
  .ticket button{ background:var(--zc); color:#14180E; border:none; border-radius:5px; padding:.22rem .4rem;
    font-size:.6rem; font-weight:700; cursor:pointer; text-transform:uppercase; letter-spacing:.03em; }
  .ticket button:disabled{ opacity:.35; cursor:not-allowed; }
  .ticket.new{ flex-direction:column; align-items:stretch; gap:.18rem; background:linear-gradient(180deg,#F6DE9C,#E3B764); border:2px solid #B8862E; box-shadow:0 0 0 2px rgba(211,162,76,.4), 0 1px 0 rgba(0,0,0,.28); padding:.3rem .4rem .32rem .5rem; }
  .ticket-top{ display:flex; align-items:center; justify-content:space-between; gap:.35rem; }
  .new-tag{ font-family:var(--f-body); font-size:.62rem; font-weight:800; text-transform:uppercase; letter-spacing:.03em; color:#5B3B0A; }
  .empty-slot{ border:1px dashed var(--line); border-radius:7px; padding:.32rem .5rem; color:var(--text-dim); font-size:.65rem; text-align:center; }

  .setup{ max-width:420px; margin:3rem auto; background:var(--surface); border:1px solid var(--line); border-radius:16px; padding:2rem; text-align:center; }
  .players-row{ display:flex; gap:.5rem; justify-content:center; margin:1.2rem 0 1.6rem; }
  .player-btn{ width:2.5rem; height:2.5rem; border-radius:50%; border:1px solid var(--line); background:var(--surface-2); color:var(--text);
    font-family:var(--f-display); font-weight:700; cursor:pointer; font-size:1rem; }
  .player-btn.active{ background:var(--moss); color:#12180F; border-color:var(--moss); }

  .modal-backdrop{ position:fixed; inset:0; background:rgba(0,0,0,.55); display:flex; align-items:center; justify-content:center; z-index:50; padding:1rem; }
  .modal{ background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:1.3rem; max-width:340px; text-align:center; }
  .modal.wide{ max-width:420px; text-align:left; width:100%; }
  .modal p{ color:var(--text-dim); font-size:.86rem; line-height:1.5; }
  .modal-actions{ display:flex; gap:.6rem; justify-content:center; margin-top:1rem; }
  .modal-log{ max-height:55vh; overflow-y:auto; }
  .modal-menu-list{ display:flex; flex-direction:column; gap:.5rem; }

  .log-item{ font-size:.75rem; color:var(--text-dim); padding:.28rem 0; border-bottom:1px solid var(--line); font-family:var(--f-mono); }
  .log-item:last-child{ border-bottom:none; }

  .finish{ max-width:500px; margin:2rem auto; background:var(--surface); border:1px solid var(--line); border-radius:16px; padding:2rem; }
  .finish h2{ font-family:var(--f-display); margin-top:0; }
  .finish ul{ padding-left:1.1rem; line-height:1.7; color:var(--text-dim); font-size:.88rem; }
  .finish li b{ color:var(--text); }

  .offline-badge{ position:fixed; top:.4rem; right:.4rem; font-size:.62rem; background:var(--surface-2); border:1px solid var(--line); color:var(--text-dim); padding:.2rem .5rem; border-radius:20px; display:none; z-index:40; }
</style>
</head>
<body>
<div class="offline-badge" id="offlineBadge">Hors-ligne</div>
<div class="wrap" id="app"></div>

<script>
"use strict";

var TOTAL_TILES = 60;
var ZONE_COUNT = 5;
var ZONE_COLORS = ['#3D6EA6', '#AEBCC6', '#3E8C52', '#E8C13A', '#C6522E'];
var ZONE_NAMES = ['An Chathair', 'Béal an Átha', 'Fiodh Ard', 'Tiobraid Árann', 'Ros Cré'];
var SHIELD_PATH = 'M2 2H22V13C22 18.2 17 22 12 24.5C7 22 2 18.2 2 13Z';
var ZONE_ICONS = [
  '<svg viewBox="0 0 24 27" class="zi"><path d="' + SHIELD_PATH + '" fill="#3D6EA6"/><rect x="6" y="10" width="3" height="3" fill="#F3EEDC"/><rect x="10.5" y="7.3" width="3" height="5.7" fill="#F3EEDC"/><rect x="15" y="10" width="3" height="3" fill="#F3EEDC"/><rect x="6" y="13" width="12" height="5.3" fill="#F3EEDC"/><rect x="11.2" y="15.3" width="1.8" height="3" fill="#3D6EA6"/></svg>',
  '<svg viewBox="0 0 24 27" class="zi"><path d="' + SHIELD_PATH + '" fill="#AEBCC6"/><rect x="4.5" y="9.3" width="15" height="2.3" rx="0.7" fill="#2A2A22"/><rect x="6.3" y="11.8" width="1.7" height="5.2" fill="#2A2A22"/><rect x="16" y="11.8" width="1.7" height="5.2" fill="#2A2A22"/><rect x="11.15" y="11.8" width="1.7" height="6.4" fill="#2A2A22"/><path d="M5 19.5c1-.8 2-.8 3 0s2 .8 3 0 2-.8 3 0 2 .8 3 0 2-.8 3 0" stroke="#2A2A22" stroke-width="0.9" fill="none" stroke-linecap="round"/></svg>',
  '<svg viewBox="0 0 24 27" class="zi"><path d="' + SHIELD_PATH + '" fill="#3E8C52"/><rect x="10.7" y="14.2" width="2.6" height="6" rx="1" fill="#F3EEDC"/><circle cx="12" cy="9.6" r="6.1" fill="#F3EEDC"/></svg>',
  '<svg viewBox="0 0 24 27" class="zi"><path d="' + SHIELD_PATH + '" fill="#E8C13A"/><ellipse cx="12" cy="12.6" rx="5.3" ry="4.9" fill="#3A2712"/><path d="M6.3 8.3c-2.1-2.4-4.1-2.5-3.5.7.3 1.6 2.1 2.6 4 2.2.7-.2 1.1-.7 1-1.4-.1-.5-.6-.9-1.5-1.5z" fill="#3A2712"/><path d="M17.7 8.3c2.1-2.4 4.1-2.5 3.5.7-.3 1.6-2.1 2.6-4 2.2-.7-.2-1.1-.7-1-1.4.1-.5.6-.9 1.5-1.5z" fill="#3A2712"/><circle cx="9.9" cy="12.1" r=".95" fill="#E8C13A"/><circle cx="14.1" cy="12.1" r=".95" fill="#E8C13A"/></svg>',
  '<svg viewBox="0 0 24 27" class="zi"><path d="' + SHIELD_PATH + '" fill="#C6522E"/><path d="M9.3 3.2H14.7L13.2 22H10.8Z" fill="#EAC24C"/><circle cx="12" cy="11.6" r="4.3" fill="none" stroke="#EAC24C" stroke-width="2.1"/></svg>'
];
var STORAGE_KEY = 'tipperary_state_v1';

var state = null;
var undoStack = [];
var ui = { showLog:false, showMenu:false, confirmReset:false, confirmFinish:false, setupPlayers:4 };

function freshState(players){
  return {
    players: players,
    totalRounds: players === 5 ? 10 : 12,
    round: 1,
    pool: Array.from({length: TOTAL_TILES}, function(_, i){ return i+1; }),
    zones: [[],[],[],[],[]],
    log: [],
    lastDraw: [],
    roundPlacements: { count: 0, zones: [false,false,false,false,false] },
    started: true,
    finished: false
  };
}

function drawInto(s, zoneIdx){
  if (s.pool.length === 0) return s;
  if (s.zones[zoneIdx].length >= 2) return s;
  var idx = Math.floor(Math.random() * s.pool.length);
  var tile = s.pool[idx];
  var newPool = s.pool.slice(0, idx).concat(s.pool.slice(idx+1));
  var newZones = s.zones.map(function(z,i){ return i===zoneIdx ? z.concat([tile]) : z; });
  var entry = { round: s.round, zone: zoneIdx, tile: tile, action: 'draw' };
  return Object.assign({}, s, { pool:newPool, zones:newZones, log: s.log.concat([entry]) });
}

function save(){
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}
function load(){
  try {
    var raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return null;
}

function pushUndo(){
  if (!state) return;
  undoStack.push(JSON.parse(JSON.stringify(state)));
  if (undoStack.length > 20) undoStack.shift();
}
function handleUndo(){
  if (undoStack.length === 0) return;
  state = undoStack.pop();
  save(); render();
}

function startGame(players){
  var s = freshState(players);
  var drawn = [];
  for (var z=0; z<ZONE_COUNT; z++){
    for (var k=0; k<2; k++){
      var before = s.pool.length;
      s = drawInto(s, z);
      if (s.pool.length < before) drawn.push({ zone:z, tile:s.zones[z][s.zones[z].length-1] });
    }
  }
  s.lastDraw = drawn;
  state = s; undoStack = [];
  save(); render();
}

function newRound(){
  if (!state || state.round >= state.totalRounds) return;
  if (state.roundPlacements.count !== state.players) return; // règle : autant de tuiles placées que de joueurs
  pushUndo();
  var s = JSON.parse(JSON.stringify(state));
  s.round = s.round + 1;
  var drawn = [];
  for (var z=0; z<ZONE_COUNT; z++){
    while (s.zones[z].length < 2 && s.pool.length > 0){
      var idx = Math.floor(Math.random() * s.pool.length);
      var tile = s.pool[idx];
      s.pool.splice(idx, 1);
      s.zones[z].push(tile);
      s.log.push({ round:s.round, zone:z, tile:tile, action:'draw' });
      drawn.push({ zone:z, tile:tile });
    }
  }
  s.lastDraw = drawn;
  s.roundPlacements = { count: 0, zones: [false,false,false,false,false] };
  state = s;
  save(); render();
}

function handlePlace(zoneIdx, tile){
  if (state.roundPlacements.zones[zoneIdx]) return; // règle : 1 seule tuile placée par zone et par manche
  pushUndo();
  var newZones = state.zones.map(function(z,i){ return i===zoneIdx ? z.filter(function(t){ return t!==tile; }) : z; });
  var entry = { round: state.round, zone: zoneIdx, tile: tile, action: 'place' };
  var newPlacements = {
    count: state.roundPlacements.count + 1,
    zones: state.roundPlacements.zones.map(function(v,i){ return i===zoneIdx ? true : v; })
  };
  state = Object.assign({}, state, { zones:newZones, log: state.log.concat([entry]), roundPlacements: newPlacements });
  save(); render();
}

function requestReset(){ ui.confirmReset = true; render(); }
function cancelReset(){ ui.confirmReset = false; render(); }
function doReset(){
  try { localStorage.removeItem(STORAGE_KEY); } catch(e) {}
  state = null; undoStack = [];
  ui = { showLog:false, showMenu:false, confirmReset:false, confirmFinish:false, setupPlayers:4 };
  render();
}

function requestFinish(){ ui.confirmFinish = true; render(); }
function cancelFinish(){ ui.confirmFinish = false; render(); }
function doFinish(){
  pushUndo();
  state = Object.assign({}, state, { finished:true });
  ui.confirmFinish = false;
  save(); render();
}

function toggle(key){ ui[key] = !ui[key]; render(); }
function setSetupPlayers(p){ ui.setupPlayers = p; render(); }

function renderSetup(){
  var opts = [2,3,4,5].map(function(p){
    return '<button class="player-btn' + (ui.setupPlayers===p ? ' active' : '') + '" onclick="setSetupPlayers(' + p + ')">' + p + '</button>';
  }).join('');
  return '' +
  '<div class="setup">' +
    '<div class="disp" style="font-size:1.7rem;font-weight:700;">Tipperary</div>' +
    '<div style="color:var(--text-dim);font-size:.82rem;margin-top:.3rem;">Tirage virtuel des tuiles Paysage</div>' +
    '<div style="margin-top:1.4rem;font-size:.82rem;color:var(--text-dim);">Nombre de joueurs</div>' +
    '<div class="players-row">' + opts + '</div>' +
    '<button class="btn btn-primary" style="width:100%;justify-content:center;padding:.7rem;" onclick="startGame(' + ui.setupPlayers + ')">Commencer la partie</button>' +
    '<div style="margin-top:1rem;font-size:.7rem;color:var(--text-dim);">' + (ui.setupPlayers===5 ? '10 manches seront jouées.' : '12 manches seront jouées.') + ' Le numéro de chaque tuile est visible sur sa face illustrée (1 à 60).</div>' +
  '</div>';
}

function renderFinish(){
  return '' +
  '<div class="finish">' +
    '<h2 class="disp">Partie terminée</h2>' +
    '<p style="color:var(--text-dim);font-size:.86rem;">Placez vos Tours restantes, puis comptez vos points dans le carnet de score :</p>' +
    '<ul>' +
      '<li><b>Terrain rectangulaire</b> — 1 PV par case du plus grand rectangle plein, sans case vide.</li>' +
      '<li><b>Moutons</b> — 1 PV par mouton de votre plus grand troupeau, +5 PV pour le plus grand troupeau de la partie.</li>' +
      '<li><b>Exploration</b> — 5 PV si votre Village est entièrement entouré de tuiles.</li>' +
      '<li><b>Farine</b> — les PV indiqués sous votre Fût sur la piste de farine.</li>' +
      '<li><b>Cercles de pierres</b> — la somme des valeurs de vos cercles de pierres.</li>' +
    '</ul>' +
    '<button class="btn btn-primary" style="width:100%;justify-content:center;margin-top:.5rem;" onclick="requestReset()">Nouvelle partie</button>' +
  '</div>';
}

function renderTopbar(){
  return '' +
  '<div class="topbar">' +
    '<div class="topbar-title disp">Tipperary <span class="topbar-sub">— Partie à ' + state.players + ' joueurs</span></div>' +
    '<div class="spacer"></div>' +
    '<button class="icon-btn" onclick="handleUndo()" ' + (undoStack.length===0?'disabled':'') + ' title="Annuler">↺</button>' +
    '<button class="icon-btn" onclick="toggle(\'showLog\')" title="Historique">☰</button>' +
    '<button class="icon-btn" onclick="toggle(\'showMenu\')" title="Plus d\'options">⋯</button>' +
  '</div>';
}

function renderRoundAction(){
  var roundLabel = 'Manche ' + state.round + '/' + state.totalRounds;
  if (state.round >= state.totalRounds){
    return '<button class="btn round-advance-btn" disabled>' + roundLabel + ' (dernière) — terminez via ⋯ quand prêt</button>';
  }
  var have = state.roundPlacements.count;
  var need = state.players;
  if (have !== need){
    var remaining = need - have;
    return '<button class="btn round-advance-btn warn" disabled>' + roundLabel + ' — ⚠ ' + have + '/' + need + ' placée(s), encore ' + remaining + '</button>';
  }
  return '<button class="btn btn-primary round-advance-btn" onclick="newRound()">' + roundLabel + ' — ▶ tirer les tuiles</button>';
}

function renderZones(){
  var freshTiles = {};
  (state.lastDraw || []).forEach(function(d){ freshTiles[d.zone + ':' + d.tile] = true; });
  var cards = state.zones.map(function(tiles, zi){
    var zoneClosed = state.roundPlacements.zones[zi];
    var ticketsHTML = tiles.length === 0
      ? '<div class="empty-slot">vide</div>'
      : tiles.map(function(t){
          var isNew = !!freshTiles[zi + ':' + t];
          if (isNew){
            return '<div class="ticket new"><div class="ticket-top"><span class="n">n°' + t + '</span><button onclick="handlePlace(' + zi + ',' + t + ')" ' + (zoneClosed ? 'disabled' : '') + '>Placer</button></div><span class="new-tag">★ à chercher</span></div>';
          }
          return '<div class="ticket"><span class="n">n°' + t + '</span><button onclick="handlePlace(' + zi + ',' + t + ')" ' + (zoneClosed ? 'disabled' : '') + '>Placer</button></div>';
        }).join('');
    return '' +
    '<div class="zone' + (zoneClosed ? ' closed' : '') + '" style="--zc:' + ZONE_COLORS[zi] + '">' +
      '<h3><span class="zone-icon">' + ZONE_ICONS[zi] + '</span>' + ZONE_NAMES[zi] + (zoneClosed ? '<span class="check">✓</span>' : '') + '</h3>' +
      '<div class="tickets">' + ticketsHTML + '</div>' +
    '</div>';
  }).join('');
  return '<div class="zones">' + cards + '</div>';
}

function renderModals(){
  var html = '';
  if (ui.showLog){
    var items = state.log.slice().reverse().map(function(e){
      return '<div class="log-item">M' + e.round + ' · ' + ZONE_NAMES[e.zone] + ' · tuile n°' + e.tile + ' · ' + (e.action==='draw'?'tirée':'placée') + '</div>';
    }).join('');
    html += '' +
    '<div class="modal-backdrop"><div class="modal wide">' +
      '<div class="disp" style="font-size:1.05rem;font-weight:700;margin-bottom:.5rem;">Historique</div>' +
      '<div class="modal-log">' + (state.log.length===0 ? 'Aucun événement pour le moment.' : items) + '</div>' +
      '<div class="modal-actions"><button class="btn btn-primary" onclick="toggle(\'showLog\')">Fermer</button></div>' +
    '</div></div>';
  }
  if (ui.showMenu){
    html += '' +
    '<div class="modal-backdrop"><div class="modal">' +
      '<div class="disp" style="font-size:1.05rem;font-weight:700;margin-bottom:.8rem;">Plus d\'options</div>' +
      '<div class="modal-menu-list">' +
        '<button class="btn" onclick="toggle(\'showMenu\');requestFinish()">🏁 Terminer la partie</button>' +
        '<button class="btn btn-danger" onclick="toggle(\'showMenu\');requestReset()">⟲ Nouvelle partie</button>' +
      '</div>' +
      '<div class="modal-actions"><button class="btn" onclick="toggle(\'showMenu\')">Fermer</button></div>' +
    '</div></div>';
  }
  if (ui.confirmReset){
    html += '' +
    '<div class="modal-backdrop"><div class="modal">' +
      '<div class="disp" style="font-size:1.1rem;font-weight:700;">Nouvelle partie ?</div>' +
      '<p>La partie en cours sera définitivement effacée.</p>' +
      '<div class="modal-actions">' +
        '<button class="btn" onclick="cancelReset()">✕ Annuler</button>' +
        '<button class="btn btn-danger" onclick="doReset()">⟲ Confirmer</button>' +
      '</div>' +
    '</div></div>';
  }
  if (ui.confirmFinish){
    html += '' +
    '<div class="modal-backdrop"><div class="modal">' +
      '<div class="disp" style="font-size:1.1rem;font-weight:700;">Terminer la partie ?</div>' +
      '<p>Vous passerez à l\'écran de calcul des scores.</p>' +
      '<div class="modal-actions">' +
        '<button class="btn" onclick="cancelFinish()">✕ Annuler</button>' +
        '<button class="btn btn-primary" onclick="doFinish()">🏁 Confirmer</button>' +
      '</div>' +
    '</div></div>';
  }
  return html;
}

function render(){
  var app = document.getElementById('app');
  if (!state){
    app.innerHTML = renderSetup() + renderModals();
    return;
  }
  if (state.finished){
    app.innerHTML = renderFinish() + renderModals();
    return;
  }
  app.innerHTML = renderTopbar() + renderRoundAction() + renderZones() + renderModals();
}

function normalizeState(s){
  if (!s) return s;
  if (!s.lastDraw) s.lastDraw = [];
  if (!s.roundPlacements || !Array.isArray(s.roundPlacements.zones) || s.roundPlacements.zones.length !== ZONE_COUNT){
    var zones = [false,false,false,false,false];
    var count = 0;
    (s.log || []).forEach(function(e){
      if (e.action === 'place' && e.round === s.round){ zones[e.zone] = true; count++; }
    });
    s.roundPlacements = { count: count, zones: zones };
  }
  return s;
}

// init
state = normalizeState(load());
render();

// offline badge
function updateOnlineBadge(){
  document.getElementById('offlineBadge').style.display = navigator.onLine ? 'none' : 'block';
}
window.addEventListener('online', updateOnlineBadge);
window.addEventListener('offline', updateOnlineBadge);
updateOnlineBadge();

// service worker for offline use
if ('serviceWorker' in navigator){
  window.addEventListener('load', function(){
    navigator.serviceWorker.register('service-worker.js').catch(function(){});
  });
}
</script>
</body>
