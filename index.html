<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>Tipperary — Tirage</title>
<meta name="description" content="Tirage virtuel des tuiles Paysage pour le jeu de société Tipperary">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1E2420">
<link rel="apple-touch-icon" href="icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Tipperary">
<style>
  :root{
    --bg:#1E2420; --surface:#262E29; --surface-2:#2F3931; --line:#3E4A41;
    --text:#EDEAD9; --text-dim:#A9B0A2;
    --moss:#7FA65E; --wheat:#D3A24C; --stone:#9C8468; --loch:#4A6B7A; --circle:#9B9B8F;
    --danger:#B5573E;
    --f-display: Georgia, 'Palatino Linotype', 'Book Antiqua', serif;
    --f-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    --f-mono: 'SF Mono', SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; background:var(--bg); color:var(--text); font-family:var(--f-body); }
  body{ padding:1rem; padding-bottom:2.5rem; -webkit-tap-highlight-color:transparent; }
  .wrap{ max-width:820px; margin:0 auto; }
  .disp{ font-family:var(--f-display); }
  .mono{ font-family:var(--f-mono); }

  .header{ background:var(--surface); border:1px solid var(--line); border-radius:14px;
    padding:1.1rem 1.3rem; margin-bottom:1rem; display:flex; flex-wrap:wrap; gap:1rem; align-items:center; justify-content:space-between; }
  .title{ font-size:1.5rem; font-weight:700; margin:0; letter-spacing:.01em; }
  .subtitle{ color:var(--text-dim); font-size:.78rem; margin-top:.2rem; }
  .stats{ display:flex; gap:.55rem; flex-wrap:wrap; }
  .stat{ background:var(--surface-2); border:1px solid var(--line); border-radius:10px; padding:.4rem .75rem; text-align:center; min-width:4rem; }
  .stat .num{ font-family:var(--f-display); font-size:1.2rem; font-weight:700; display:block; line-height:1.1; }
  .stat .lbl{ font-size:.6rem; text-transform:uppercase; letter-spacing:.07em; color:var(--text-dim); }

  .toolbar{ display:flex; flex-wrap:wrap; gap:.5rem; margin-bottom:1rem; }
  .btn{ display:inline-flex; align-items:center; gap:.35rem; background:var(--surface-2); color:var(--text);
    border:1px solid var(--line); border-radius:9px; padding:.45rem .7rem; font-size:.76rem; cursor:pointer; font-family:var(--f-body); }
  .btn:active{ background:#374238; }
  .btn:disabled{ opacity:.35; }
  .btn-danger{ border-color:var(--danger); color:#F0C6B9; }
  .btn-primary{ background:var(--moss); color:#12180F; border-color:var(--moss); font-weight:700; }

  .panel{ background:var(--surface); border:1px solid var(--line); border-radius:12px; padding:1rem 1.1rem; margin-bottom:1rem; font-size:.84rem; line-height:1.55; color:var(--text-dim); }
  .panel b{ color:var(--text); }
  .panel ol{ margin:.4rem 0 0 1.1rem; padding:0; }

  .zones{ display:grid; grid-template-columns:1fr; gap:.85rem; }
  @media(min-width:640px){ .zones{ grid-template-columns:repeat(2,1fr); } }
  @media(min-width:980px){ .zones{ grid-template-columns:repeat(3,1fr); } }

  .zone{ background:var(--surface); border:1px solid var(--line); border-left:5px solid var(--zc);
    border-radius:12px; padding:.9rem 1rem; display:flex; flex-direction:column; gap:.6rem; }
  .zone h3{ margin:0; font-family:var(--f-display); font-size:1.02rem; display:flex; align-items:center; gap:.5rem; font-weight:700; }
  .dot{ width:9px; height:9px; border-radius:50%; background:var(--zc); flex-shrink:0; display:inline-block; }

  .tickets{ display:flex; flex-direction:column; gap:.42rem; min-height:2rem; }
  .ticket{ display:flex; align-items:center; justify-content:space-between; gap:.5rem;
    background:linear-gradient(180deg,#F4EEDC,#E7DDC0); color:#2A2920; border-radius:8px;
    padding:.42rem .5rem .42rem .7rem; box-shadow:0 2px 0 rgba(0,0,0,.28); border:1px solid rgba(0,0,0,.15); }
  .ticket .n{ font-family:var(--f-mono); font-weight:700; font-size:1.2rem; }
  .ticket button{ background:var(--zc); color:#14180E; border:none; border-radius:6px; padding:.32rem .55rem;
    font-size:.66rem; font-weight:700; cursor:pointer; text-transform:uppercase; letter-spacing:.04em; }
  .ticket button:disabled{ opacity:.35; cursor:not-allowed; }
  .zone-done{ margin-left:auto; font-family:var(--f-body); font-size:.62rem; font-weight:700; text-transform:uppercase; letter-spacing:.04em; color:var(--text-dim); background:var(--surface-2); border:1px solid var(--line); padding:.15rem .45rem; border-radius:20px; }
  .ticket.new{ border:2px solid var(--wheat); box-shadow:0 0 0 3px rgba(211,162,76,.3), 0 2px 0 rgba(0,0,0,.28); }
  .new-tag{ font-family:var(--f-body); font-size:.58rem; font-weight:700; text-transform:uppercase; letter-spacing:.05em; color:#8A5E15; background:rgba(211,162,76,.35); padding:.1rem .35rem; border-radius:5px; vertical-align:middle; }
  .empty-slot{ border:1px dashed var(--line); border-radius:8px; padding:.5rem .7rem; color:var(--text-dim); font-size:.73rem; text-align:center; }

  .fetch-banner{ border-color:var(--wheat); }
  .fetch-list{ display:grid; grid-template-columns:1fr; gap:.4rem; margin-top:.6rem; }
  @media(min-width:640px){ .fetch-list{ grid-template-columns:repeat(2,1fr); } }
  .fetch-item{ display:flex; align-items:center; gap:.4rem; background:var(--surface-2); border:1px solid var(--line); border-left:4px solid var(--zc); border-radius:8px; padding:.5rem .7rem; font-size:.86rem; color:var(--text); }
  .fetch-num{ font-size:1.15rem; font-weight:800; margin-left:auto; }

  .round-advance-btn{ width:100%; justify-content:center; padding:.75rem; font-size:.9rem; margin-bottom:1rem; }
  .round-advance-btn:disabled{ opacity:.4; cursor:not-allowed; }
  .warn-panel{ border-color:var(--danger); margin-bottom:1rem; }
  .warn-panel .round-advance-btn{ margin-bottom:.6rem; }
  .warn-text{ color:#F0C6B9; font-size:.8rem; text-align:center; }

  .setup{ max-width:420px; margin:3rem auto; background:var(--surface); border:1px solid var(--line); border-radius:16px; padding:2rem; text-align:center; }
  .players-row{ display:flex; gap:.5rem; justify-content:center; margin:1.2rem 0 1.6rem; }
  .player-btn{ width:2.5rem; height:2.5rem; border-radius:50%; border:1px solid var(--line); background:var(--surface-2); color:var(--text);
    font-family:var(--f-display); font-weight:700; cursor:pointer; font-size:1rem; }
  .player-btn.active{ background:var(--moss); color:#12180F; border-color:var(--moss); }

  .modal-backdrop{ position:fixed; inset:0; background:rgba(0,0,0,.55); display:flex; align-items:center; justify-content:center; z-index:50; padding:1rem; }
  .modal{ background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:1.3rem; max-width:340px; text-align:center; }
  .modal p{ color:var(--text-dim); font-size:.86rem; line-height:1.5; }
  .modal-actions{ display:flex; gap:.6rem; justify-content:center; margin-top:1rem; }

  .log-item{ font-size:.75rem; color:var(--text-dim); padding:.28rem 0; border-bottom:1px solid var(--line); font-family:var(--f-mono); }
  .log-item:last-child{ border-bottom:none; }

  .lookup-result{ margin-top:.55rem; font-size:.83rem; padding:.55rem .75rem; border-radius:8px; background:var(--surface-2); border:1px solid var(--line); }

  .finish{ max-width:500px; margin:2rem auto; background:var(--surface); border:1px solid var(--line); border-radius:16px; padding:2rem; }
  .finish h2{ font-family:var(--f-display); margin-top:0; }
  .finish ul{ padding-left:1.1rem; line-height:1.7; color:var(--text-dim); font-size:.88rem; }
  .finish li b{ color:var(--text); }

  input.inp{ background:var(--surface-2); border:1px solid var(--line); color:var(--text); border-radius:8px; padding:.5rem .7rem; font-size:.95rem; width:100%; font-family:var(--f-mono); }
  .offline-badge{ position:fixed; top:.5rem; right:.5rem; font-size:.65rem; background:var(--surface-2); border:1px solid var(--line); color:var(--text-dim); padding:.25rem .55rem; border-radius:20px; display:none; }
</style>
</head>
<body>
<div class="offline-badge" id="offlineBadge">Hors-ligne</div>
<div class="wrap" id="app"></div>

<script>
"use strict";

var TOTAL_TILES = 60;
var ZONE_COUNT = 5;
var ZONE_COLORS = ['#7FA65E', '#D3A24C', '#8B7355', '#4A6B7A', '#9B9B8F'];
var ZONE_NAMES = ['Zone 1', 'Zone 2', 'Zone 3', 'Zone 4', 'Zone 5'];
var STORAGE_KEY = 'tipperary_state_v1';

var state = null;
var undoStack = [];
var ui = { showHelp:false, showLog:false, showLookup:false, lookupValue:'', confirmReset:false, confirmFinish:false, setupPlayers:4 };

function freshState(players){
  return {
    players: players,
    totalRounds: players === 5 ? 10 : 12,
    round: 1,
    pool: Array.from({length: TOTAL_TILES}, function(_, i){ return i+1; }),
    zones: [[],[],[],[],[]],
    log: [],
    lastDraw: [],
    roundPlacements: { count: 0, zones: [false,false,false,false,false] },
    started: true,
    finished: false
  };
}

function drawInto(s, zoneIdx){
  if (s.pool.length === 0) return s;
  if (s.zones[zoneIdx].length >= 2) return s;
  var idx = Math.floor(Math.random() * s.pool.length);
  var tile = s.pool[idx];
  var newPool = s.pool.slice(0, idx).concat(s.pool.slice(idx+1));
  var newZones = s.zones.map(function(z,i){ return i===zoneIdx ? z.concat([tile]) : z; });
  var entry = { round: s.round, zone: zoneIdx, tile: tile, action: 'draw' };
  return Object.assign({}, s, { pool:newPool, zones:newZones, log: s.log.concat([entry]) });
}

function save(){
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}
function load(){
  try {
    var raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return null;
}

function pushUndo(){
  if (!state) return;
  undoStack.push(JSON.parse(JSON.stringify(state)));
  if (undoStack.length > 20) undoStack.shift();
}
function handleUndo(){
  if (undoStack.length === 0) return;
  state = undoStack.pop();
  save(); render();
}

function startGame(players){
  var s = freshState(players);
  var drawn = [];
  for (var z=0; z<ZONE_COUNT; z++){
    for (var k=0; k<2; k++){
      var before = s.pool.length;
      s = drawInto(s, z);
      if (s.pool.length < before) drawn.push({ zone:z, tile:s.zones[z][s.zones[z].length-1] });
    }
  }
  s.lastDraw = drawn;
  state = s; undoStack = [];
  save(); render();
}

function newRound(){
  if (!state || state.round >= state.totalRounds) return;
  if (state.roundPlacements.count !== state.players) return; // règle : autant de tuiles placées que de joueurs
  pushUndo();
  var s = JSON.parse(JSON.stringify(state));
  s.round = s.round + 1;
  var drawn = [];
  for (var z=0; z<ZONE_COUNT; z++){
    while (s.zones[z].length < 2 && s.pool.length > 0){
      var idx = Math.floor(Math.random() * s.pool.length);
      var tile = s.pool[idx];
      s.pool.splice(idx, 1);
      s.zones[z].push(tile);
      s.log.push({ round:s.round, zone:z, tile:tile, action:'draw' });
      drawn.push({ zone:z, tile:tile });
    }
  }
  s.lastDraw = drawn;
  s.roundPlacements = { count: 0, zones: [false,false,false,false,false] };
  state = s;
  save(); render();
}

function handlePlace(zoneIdx, tile){
  if (state.roundPlacements.zones[zoneIdx]) return; // règle : 1 seule tuile placée par zone et par manche
  pushUndo();
  var newZones = state.zones.map(function(z,i){ return i===zoneIdx ? z.filter(function(t){ return t!==tile; }) : z; });
  var entry = { round: state.round, zone: zoneIdx, tile: tile, action: 'place' };
  var newPlacements = {
    count: state.roundPlacements.count + 1,
    zones: state.roundPlacements.zones.map(function(v,i){ return i===zoneIdx ? true : v; })
  };
  state = Object.assign({}, state, { zones:newZones, log: state.log.concat([entry]), roundPlacements: newPlacements });
  save(); render();
}

function requestReset(){ ui.confirmReset = true; render(); }
function cancelReset(){ ui.confirmReset = false; render(); }
function doReset(){
  try { localStorage.removeItem(STORAGE_KEY); } catch(e) {}
  state = null; undoStack = [];
  ui = { showHelp:false, showLog:false, showLookup:false, lookupValue:'', confirmReset:false, confirmFinish:false, setupPlayers:4 };
  render();
}

function requestFinish(){ ui.confirmFinish = true; render(); }
function cancelFinish(){ ui.confirmFinish = false; render(); }
function doFinish(){
  pushUndo();
  state = Object.assign({}, state, { finished:true });
  ui.confirmFinish = false;
  save(); render();
}

function toggle(key){ ui[key] = !ui[key]; render(); }
function setSetupPlayers(p){ ui.setupPlayers = p; render(); }

function lookupStatus(nRaw){
  var n = parseInt(nRaw, 10);
  if (!state) return null;
  if (!Number.isInteger(n) || n < 1 || n > TOTAL_TILES) return { type:'invalid' };
  if (state.pool.indexOf(n) !== -1) return { type:'bag' };
  for (var i=0; i<ZONE_COUNT; i++){
    if (state.zones[i].indexOf(n) !== -1) return { type:'zone', zone:i };
  }
  var placed = null;
  for (var j=state.log.length-1; j>=0; j--){
    if (state.log[j].tile === n && state.log[j].action === 'place'){ placed = state.log[j]; break; }
  }
  if (placed) return { type:'placed', round: placed.round, zone: placed.zone };
  return { type:'unknown' };
}

function lookupResultHTML(value){
  if (value === '') return '';
  var r = lookupStatus(value);
  if (!r || r.type === 'invalid') return '<div class="lookup-result">Numéro invalide (1 à 60).</div>';
  if (r.type === 'bag') return '<div class="lookup-result">Encore dans le sac.</div>';
  if (r.type === 'zone') return '<div class="lookup-result">Actuellement dans <b style="color:var(--text)">' + ZONE_NAMES[r.zone] + '</b>.</div>';
  if (r.type === 'placed') return '<div class="lookup-result">Déjà placée par un joueur (' + ZONE_NAMES[r.zone] + ', manche ' + r.round + ').</div>';
  return '<div class="lookup-result">Non tirée pour l\'instant.</div>';
}

function onLookupInput(value){
  ui.lookupValue = value;
  var el = document.getElementById('lookupResult');
  if (el) el.innerHTML = lookupResultHTML(value);
}

function esc(s){ return String(s); }

function renderSetup(){
  var opts = [2,3,4,5].map(function(p){
    return '<button class="player-btn' + (ui.setupPlayers===p ? ' active' : '') + '" onclick="setSetupPlayers(' + p + ')">' + p + '</button>';
  }).join('');
  return '' +
  '<div class="setup">' +
    '<div class="disp" style="font-size:1.7rem;font-weight:700;">Tipperary</div>' +
    '<div style="color:var(--text-dim);font-size:.82rem;margin-top:.3rem;">Tirage virtuel des tuiles Paysage</div>' +
    '<div style="margin-top:1.4rem;font-size:.82rem;color:var(--text-dim);">Nombre de joueurs</div>' +
    '<div class="players-row">' + opts + '</div>' +
    '<button class="btn btn-primary" style="width:100%;justify-content:center;padding:.7rem;" onclick="startGame(' + ui.setupPlayers + ')">Commencer la partie</button>' +
    '<div style="margin-top:1rem;font-size:.7rem;color:var(--text-dim);">' + (ui.setupPlayers===5 ? '10 manches seront jouées.' : '12 manches seront jouées.') + ' Le numéro de chaque tuile est visible sur sa face illustrée (1 à 60).</div>' +
  '</div>';
}

function renderFinish(){
  return '' +
  '<div class="finish">' +
    '<h2 class="disp">Partie terminée</h2>' +
    '<p style="color:var(--text-dim);font-size:.86rem;">Placez vos Tours restantes, puis comptez vos points dans le carnet de score :</p>' +
    '<ul>' +
      '<li><b>Terrain rectangulaire</b> — 1 PV par case du plus grand rectangle plein, sans case vide.</li>' +
      '<li><b>Moutons</b> — 1 PV par mouton de votre plus grand troupeau, +5 PV pour le plus grand troupeau de la partie.</li>' +
      '<li><b>Exploration</b> — 5 PV si votre Village est entièrement entouré de tuiles.</li>' +
      '<li><b>Farine</b> — les PV indiqués sous votre Fût sur la piste de farine.</li>' +
      '<li><b>Cercles de pierres</b> — la somme des valeurs de vos cercles de pierres.</li>' +
    '</ul>' +
    '<button class="btn btn-primary" style="width:100%;justify-content:center;margin-top:.5rem;" onclick="requestReset()">Nouvelle partie</button>' +
  '</div>';
}

function renderHeader(){
  var placedCount = TOTAL_TILES - state.pool.length - state.zones.reduce(function(a,z){ return a+z.length; }, 0);
  return '' +
  '<div class="header">' +
    '<div>' +
      '<div class="title disp">Tipperary</div>' +
      '<div class="subtitle">Tirage virtuel · ' + state.players + ' joueurs</div>' +
    '</div>' +
    '<div class="stats">' +
      '<div class="stat"><span class="num mono">' + state.pool.length + '</span><span class="lbl">dans le sac</span></div>' +
      '<div class="stat"><span class="num mono">' + placedCount + '</span><span class="lbl">placées</span></div>' +
      '<div class="stat"><span class="num mono">' + state.round + '/' + state.totalRounds + '</span><span class="lbl">manche</span></div>' +
    '</div>' +
  '</div>';
}

function renderFetchBanner(){
  if (!state.lastDraw || state.lastDraw.length === 0) return '';
  var sorted = state.lastDraw.slice().sort(function(a,b){ return a.zone - b.zone; });
  var items = sorted.map(function(d){
    return '<div class="fetch-item" style="--zc:' + ZONE_COLORS[d.zone] + '"><span class="dot"></span>' + ZONE_NAMES[d.zone] + ' → <span class="fetch-num mono">n° ' + d.tile + '</span></div>';
  }).join('');
  return '<div class="panel fetch-banner"><b>Tuiles à aller chercher et à poser dans le quartier indiqué :</b><div class="fetch-list">' + items + '</div></div>';
}

function renderRoundAction(){
  if (state.round >= state.totalRounds){
    return '<div class="panel" style="text-align:center;">Dernière manche — jouez-la, puis appuyez sur « Terminer la partie ».</div>';
  }
  var have = state.roundPlacements.count;
  var need = state.players;
  if (have !== need){
    var remaining = need - have;
    return '<div class="panel warn-panel">' +
      '<button class="btn btn-primary round-advance-btn" disabled>▶ Manche suivante — tirer les tuiles manquantes</button>' +
      '<div class="warn-text">⚠ ' + have + ' / ' + need + ' tuile(s) placée(s) cette manche — encore ' + remaining + ' à poser (une par joueur) avant de continuer.</div>' +
    '</div>';
  }
  return '<button class="btn btn-primary round-advance-btn" onclick="newRound()">▶ Manche suivante — tirer les tuiles manquantes</button>';
}

function renderToolbar(){
  return '' +
  '<div class="toolbar">' +
    '<button class="btn" onclick="toggle(\'showHelp\')">❓ Aide</button>' +
    '<button class="btn" onclick="toggle(\'showLookup\')">🔍 Chercher une tuile</button>' +
    '<button class="btn" onclick="toggle(\'showLog\')">▾ Historique (' + state.log.length + ')</button>' +
    '<button class="btn" onclick="handleUndo()" ' + (undoStack.length===0?'disabled':'') + '>↺ Annuler</button>' +
    '<button class="btn" onclick="requestFinish()">🏁 Terminer la partie</button>' +
    '<button class="btn btn-danger" onclick="requestReset()">⟲ Nouvelle partie</button>' +
  '</div>';
}

function renderPanels(){
  var html = '';
  if (ui.showHelp){
    html += '' +
    '<div class="panel">' +
      '<b>Comment ça remplace le sac :</b>' +
      '<ol>' +
        '<li>Les 60 tuiles restent chez vous, triées par numéro (1 à 60, visible sur la face illustrée), pas besoin du sac.</li>' +
        '<li>Chaque manche, tournez la roue comme d\'habitude sur le plateau physique.</li>' +
        '<li>Pour chaque zone désignée, prenez les tuiles indiquées ici par leur numéro, laissez les joueurs choisir, puis appuyez « Placer » sur celle qui est jouée.</li>' +
        '<li>Une fois tous les choix faits, appuyez « Manche suivante » : l\'appli tire automatiquement les nouvelles tuiles nécessaires et vous indique où les poser.</li>' +
      '</ol>' +
      'Numérotez mentalement vos 5 zones (par exemple dans le sens horaire) pour qu\'elles correspondent à celles ci-dessous.' +
    '</div>';
  }
  if (ui.showLookup){
    html += '' +
    '<div class="panel">' +
      '<b>Statut d\'une tuile</b>' +
      '<div style="margin-top:.5rem;"><input class="inp" type="number" min="1" max="60" placeholder="Numéro de la tuile (1-60)" value="' + esc(ui.lookupValue) + '" oninput="onLookupInput(this.value)"></div>' +
      '<div id="lookupResult">' + lookupResultHTML(ui.lookupValue) + '</div>' +
    '</div>';
  }
  if (ui.showLog){
    var items = state.log.slice().reverse().map(function(e){
      return '<div class="log-item">M' + e.round + ' · ' + ZONE_NAMES[e.zone] + ' · tuile n°' + e.tile + ' · ' + (e.action==='draw'?'tirée':'placée') + '</div>';
    }).join('');
    html += '<div class="panel" style="max-height:220px;overflow-y:auto;">' + (state.log.length===0 ? 'Aucun événement pour le moment.' : items) + '</div>';
  }
  return html;
}

function renderZones(){
  var freshTiles = {};
  (state.lastDraw || []).forEach(function(d){ freshTiles[d.zone + ':' + d.tile] = true; });
  var cards = state.zones.map(function(tiles, zi){
    var zoneClosed = state.roundPlacements.zones[zi];
    var ticketsHTML = tiles.length === 0
      ? '<div class="empty-slot">vide</div>'
      : tiles.map(function(t){
          var isNew = !!freshTiles[zi + ':' + t];
          return '<div class="ticket' + (isNew ? ' new' : '') + '"><span class="n">n° ' + t + (isNew ? ' <span class="new-tag">nouveau</span>' : '') + '</span><button onclick="handlePlace(' + zi + ',' + t + ')" ' + (zoneClosed ? 'disabled' : '') + '>✓ Placer</button></div>';
        }).join('');
    return '' +
    '<div class="zone" style="--zc:' + ZONE_COLORS[zi] + '">' +
      '<h3><span class="dot"></span>' + ZONE_NAMES[zi] + (zoneClosed ? '<span class="zone-done">jouée ✓</span>' : '') + '</h3>' +
      '<div class="tickets">' + ticketsHTML + '</div>' +
    '</div>';
  }).join('');
  return '<div class="zones">' + cards + '</div>';
}

function renderModals(){
  var html = '';
  if (ui.confirmReset){
    html += '' +
    '<div class="modal-backdrop"><div class="modal">' +
      '<div class="disp" style="font-size:1.1rem;font-weight:700;">Nouvelle partie ?</div>' +
      '<p>La partie en cours sera définitivement effacée.</p>' +
      '<div class="modal-actions">' +
        '<button class="btn" onclick="cancelReset()">✕ Annuler</button>' +
        '<button class="btn btn-danger" onclick="doReset()">⟲ Confirmer</button>' +
      '</div>' +
    '</div></div>';
  }
  if (ui.confirmFinish){
    html += '' +
    '<div class="modal-backdrop"><div class="modal">' +
      '<div class="disp" style="font-size:1.1rem;font-weight:700;">Terminer la partie ?</div>' +
      '<p>Vous passerez à l\'écran de calcul des scores.</p>' +
      '<div class="modal-actions">' +
        '<button class="btn" onclick="cancelFinish()">✕ Annuler</button>' +
        '<button class="btn btn-primary" onclick="doFinish()">🏁 Confirmer</button>' +
      '</div>' +
    '</div></div>';
  }
  return html;
}

function render(){
  var app = document.getElementById('app');
  if (!state){
    app.innerHTML = renderSetup() + renderModals();
    return;
  }
  if (state.finished){
    app.innerHTML = renderFinish() + renderModals();
    return;
  }
  app.innerHTML = renderHeader() + renderFetchBanner() + renderRoundAction() + renderToolbar() + renderPanels() + renderZones() + renderModals();
}

function normalizeState(s){
  if (!s) return s;
  if (!s.lastDraw) s.lastDraw = [];
  if (!s.roundPlacements || !Array.isArray(s.roundPlacements.zones) || s.roundPlacements.zones.length !== ZONE_COUNT){
    var zones = [false,false,false,false,false];
    var count = 0;
    (s.log || []).forEach(function(e){
      if (e.action === 'place' && e.round === s.round){ zones[e.zone] = true; count++; }
    });
    s.roundPlacements = { count: count, zones: zones };
  }
  return s;
}

// init
state = normalizeState(load());
render();

// offline badge
function updateOnlineBadge(){
  document.getElementById('offlineBadge').style.display = navigator.onLine ? 'none' : 'block';
}
window.addEventListener('online', updateOnlineBadge);
window.addEventListener('offline', updateOnlineBadge);
updateOnlineBadge();

// service worker for offline use
if ('serviceWorker' in navigator){
  window.addEventListener('load', function(){
    navigator.serviceWorker.register('service-worker.js').catch(function(){});
  });
}
</script>
</body>
</html>
