<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>Tipperary — Tirage</title>
<meta name="description" content="Tirage virtuel des tuiles Paysage pour le jeu de société Tipperary">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1E2420">
<link rel="apple-touch-icon" href="icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Tipperary">
<style>
  :root{
    --bg:#1E2420; --surface:#262E29; --surface-2:#2F3931; --line:#3E4A41;
    --text:#EDEAD9; --text-dim:#A9B0A2;
    --moss:#7FA65E; --wheat:#D3A24C; --stone:#9C8468; --loch:#4A6B7A; --circle:#9B9B8F;
    --danger:#B5573E;
    --f-display: Georgia, 'Palatino Linotype', 'Book Antiqua', serif;
    --f-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    --f-mono: 'SF Mono', SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; background:var(--bg); color:var(--text); font-family:var(--f-body); height:100%; }
  body{ padding:.6rem; -webkit-tap-highlight-color:transparent; }
  .wrap{ max-width:820px; margin:0 auto; }
  .disp{ font-family:var(--f-display); }
  .mono{ font-family:var(--f-mono); }

  .topbar{ display:flex; align-items:center; gap:.35rem; background:var(--surface); border:1px solid var(--line);
    border-radius:12px; padding:.4rem .5rem; margin-bottom:.5rem; overflow-x:auto; }
  .spacer{ flex:1; min-width:.3rem; }
  .topbar-title{ font-weight:700; font-size:.98rem; white-space:nowrap; flex-shrink:0; padding-left:.2rem; }
  .topbar-sub{ font-family:var(--f-body); font-weight:400; color:var(--text-dim); font-size:.84rem; }
  .icon-btn{ width:2.2rem; height:2.2rem; border-radius:8px; border:1px solid var(--line); background:var(--surface-2);
    color:var(--text); display:flex; align-items:center; justify-content:center; font-size:1.05rem; cursor:pointer; flex-shrink:0; padding:0; }
  .icon-btn:disabled{ opacity:.3; }
  .icon-btn:active{ background:#374238; }

  .btn{ display:inline-flex; align-items:center; justify-content:center; gap:.35rem; background:var(--surface-2); color:var(--text);
    border:1px solid var(--line); border-radius:9px; padding:.55rem .8rem; font-size:.9rem; cursor:pointer; font-family:var(--f-body); }
  .btn:active{ background:#374238; }
  .btn:disabled{ opacity:.35; }
  .btn-danger{ border-color:var(--danger); color:#F0C6B9; }
  .btn-primary{ background:var(--moss); color:#12180F; border-color:var(--moss); font-weight:700; }

  .round-advance-btn{ width:100%; text-align:center; padding:.65rem; font-size:.88rem; margin-bottom:.6rem; line-height:1.35; }
  .round-advance-btn:disabled{ opacity:.55; cursor:not-allowed; }
  .round-advance-btn.warn{ border-color:var(--danger); color:#F0C6B9; }

  .zones{ display:flex; flex-direction:column; gap:.75rem; }

  .zone{ background:var(--surface); border:1px solid var(--line); border-left:5px solid var(--zc);
    border-radius:12px; padding:.7rem .8rem; display:flex; flex-direction:column; gap:.5rem; transition:opacity .15s; }
  .zone.closed{ opacity:.62; cursor:pointer; -webkit-tap-highlight-color:transparent; }
  .zone.closed:active{ opacity:.8; }
  .zone h3{ margin:0; font-family:var(--f-display); font-size:1.05rem; font-weight:700; display:flex; align-items:center; gap:.5rem; }
  .zone h3 .check{ margin-left:auto; color:var(--text); font-size:1rem; opacity:.85; }
  .zone-icon{ display:inline-flex; flex-shrink:0; }
  .zi{ width:24px; height:27px; display:block; }

  .tickets{ display:flex; flex-direction:row; gap:.55rem; }
  .ticket{ flex:1; position:relative; display:flex; align-items:center; justify-content:center;
    background:linear-gradient(180deg,#F4EEDC,#E7DDC0); color:#2A2920; border-radius:10px;
    padding:.85rem .5rem; box-shadow:0 2px 0 rgba(0,0,0,.28); border:1px solid rgba(0,0,0,.15);
    cursor:pointer; text-align:center; -webkit-tap-highlight-color:transparent; user-select:none; }
  .ticket:active{ filter:brightness(.92); }
  .ticket .n{ font-family:var(--f-mono); font-weight:800; font-size:1.4rem; }
  .ticket.locked{ cursor:not-allowed; opacity:.4; }
  .ticket.new{ background:linear-gradient(180deg,#F6DE9C,#E3B764); border:2px solid #B8862E; box-shadow:0 0 0 2px rgba(211,162,76,.4), 0 2px 0 rgba(0,0,0,.28); }
  .new-badge{ position:absolute; top:-8px; right:-8px; width:22px; height:22px; border-radius:50%; background:#B8862E;
    color:#FFF6DE; display:flex; align-items:center; justify-content:center; font-size:.78rem; box-shadow:0 2px 4px rgba(0,0,0,.4); border:1.5px solid #F6DE9C; }
  .empty-slot{ flex:1; border:1px dashed var(--line); border-radius:10px; padding:.7rem .5rem; color:var(--text-dim); font-size:.78rem; text-align:center; }

  .setup{ max-width:420px; margin:3rem auto; background:var(--surface); border:1px solid var(--line); border-radius:16px; padding:2rem; text-align:center; }
  .players-row{ display:flex; gap:.5rem; justify-content:center; margin:1.2rem 0 1.6rem; }
  .player-btn{ width:2.5rem; height:2.5rem; border-radius:50%; border:1px solid var(--line); background:var(--surface-2); color:var(--text);
    font-family:var(--f-display); font-weight:700; cursor:pointer; font-size:1rem; }
  .player-btn.active{ background:var(--moss); color:#12180F; border-color:var(--moss); }

  .modal-backdrop{ position:fixed; inset:0; background:rgba(0,0,0,.55); display:flex; align-items:center; justify-content:center; z-index:50; padding:1rem; }
  .modal{ background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:1.3rem; max-width:340px; text-align:center; }
  .modal.wide{ max-width:420px; text-align:left; width:100%; }
  .modal p{ color:var(--text-dim); font-size:.92rem; line-height:1.5; }
  .modal-actions{ display:flex; gap:.6rem; justify-content:center; margin-top:1rem; }
  .modal-log{ max-height:55vh; overflow-y:auto; }
  .modal-menu-list{ display:flex; flex-direction:column; gap:.5rem; }

  .log-item{ font-size:.82rem; color:var(--text-dim); padding:.28rem 0; border-bottom:1px solid var(--line); font-family:var(--f-mono); }
  .log-item:last-child{ border-bottom:none; }

  .finish{ max-width:500px; margin:2rem auto; background:var(--surface); border:1px solid var(--line); border-radius:16px; padding:2rem; }
  .finish h2{ font-family:var(--f-display); margin-top:0; }
  .finish ul{ padding-left:1.1rem; line-height:1.7; color:var(--text-dim); font-size:.94rem; }
  .finish li b{ color:var(--text); }

  .offline-badge{ position:fixed; top:.4rem; right:.4rem; font-size:.62rem; background:var(--surface-2); border:1px solid var(--line); color:var(--text-dim); padding:.2rem .5rem; border-radius:20px; display:none; z-index:40; }

  .hint-banner{ display:flex; align-items:center; gap:.6rem; background:var(--surface-2); border:1px solid var(--wheat);
    border-radius:10px; padding:.6rem .7rem; margin-bottom:.6rem; font-size:.8rem; line-height:1.4; color:var(--text); }
  .hint-close{ margin-left:auto; background:none; border:none; color:var(--text-dim); font-size:1rem; cursor:pointer; padding:.15rem; flex-shrink:0; }
</style>
</head>

function t(key, vars){
  var entry = I18N[key];
  if (!entry) return key;
  var str = entry[currentLang] || entry.fr;
  if (vars){
    Object.keys(vars).forEach(function(k){ str = str.split('{' + k + '}').join(vars[k]); });
  }
  return str;
}

function setLang(code){
  if (LANGS.indexOf(code) === -1) return;
  currentLang = code;
  try { localStorage.setItem('tipperary_lang', code); } catch(e) {}
  var badge = document.getElementById('offlineBadge');
  if (badge) badge.textContent = t('offline_text');
  document.documentElement.lang = code;
  ui.showLangMenu = false;
  render();
}

var state = null;
var undoStack = [];
var ui = { showLog:false, showMenu:false, showLangMenu:false, confirmReset:false, confirmFinish:false, setupPlayers:4 };

function freshState(players){
  return {
    players: players,
    totalRounds: players === 5 ? 10 : 12,
    round: 1,
    pool: Array.from({length: TOTAL_TILES}, function(_, i){ return i+1; }),
    zones: [[],[],[],[],[]],
    log: [],
    lastDraw: [],
    roundPlacements: { count: 0, zones: [false,false,false,false,false] },
    started: true,
    finished: false
  };
}

function drawInto(s, zoneIdx){
  if (s.pool.length === 0) return s;
  if (s.zones[zoneIdx].length >= 2) return s;
  var idx = Math.floor(Math.random() * s.pool.length);
  var tile = s.pool[idx];
  var newPool = s.pool.slice(0, idx).concat(s.pool.slice(idx+1));
  var newZones = s.zones.map(function(z,i){ return i===zoneIdx ? z.concat([tile]) : z; });
  var entry = { round: s.round, zone: zoneIdx, tile: tile, action: 'draw' };
  return Object.assign({}, s, { pool:newPool, zones:newZones, log: s.log.concat([entry]) });
}

function save(){
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}
function load(){
  try {
    var raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return null;
}

function pushUndo(){
  if (!state) return;
  undoStack.push(JSON.parse(JSON.stringify(state)));
  if (undoStack.length > 20) undoStack.shift();
}
function handleUndo(){
  if (undoStack.length === 0) return;
  state = undoStack.pop();
  save(); render();
}

function startGame(players){
  var s = freshState(players);
  var drawn = [];
  for (var z=0; z<ZONE_COUNT; z++){
    for (var k=0; k<2; k++){
      var before = s.pool.length;
      s = drawInto(s, z);
      if (s.pool.length < before) drawn.push({ zone:z, tile:s.zones[z][s.zones[z].length-1] });
    }
  }
  s.lastDraw = drawn;
  state = s; undoStack = [];
  save(); render();
}

function newRound(){
  if (!state || state.round >= state.totalRounds) return;
  if (state.roundPlacements.count !== state.players) return; // règle : autant de tuiles placées que de joueurs
  pushUndo();
  var s = JSON.parse(JSON.stringify(state));
  s.round = s.round + 1;
  var drawn = [];
  for (var z=0; z<ZONE_COUNT; z++){
    while (s.zones[z].length < 2 && s.pool.length > 0){
      var idx = Math.floor(Math.random() * s.pool.length);
      var tile = s.pool[idx];
      s.pool.splice(idx, 1);
      s.zones[z].push(tile);
      s.log.push({ round:s.round, zone:z, tile:tile, action:'draw' });
      drawn.push({ zone:z, tile:tile });
    }
  }
  s.lastDraw = drawn;
  s.roundPlacements = { count: 0, zones: [false,false,false,false,false] };
  state = s;
  save(); render();
}

function handlePlace(zoneIdx, tile){
  if (state.roundPlacements.zones[zoneIdx]) return; // règle : 1 seule tuile placée par zone et par manche
  pushUndo();
  var newZones = state.zones.map(function(z,i){ return i===zoneIdx ? z.filter(function(t){ return t!==tile; }) : z; });
  var entry = { round: state.round, zone: zoneIdx, tile: tile, action: 'place' };
  var newPlacements = {
    count: state.roundPlacements.count + 1,
    zones: state.roundPlacements.zones.map(function(v,i){ return i===zoneIdx ? true : v; })
  };
  state = Object.assign({}, state, { zones:newZones, log: state.log.concat([entry]), roundPlacements: newPlacements });
  save(); render();
}

function cancelPlacement(zoneIdx){
  if (!state.roundPlacements.zones[zoneIdx]) return;
  var idx = -1;
  for (var i = state.log.length - 1; i >= 0; i--){
    if (state.log[i].action === 'place' && state.log[i].zone === zoneIdx && state.log[i].round === state.round){ idx = i; break; }
  }
  if (idx === -1) return;
  pushUndo();
  var tile = state.log[idx].tile;
  var newLog = state.log.slice(0, idx).concat(state.log.slice(idx + 1));
  var newZones = state.zones.map(function(z, i){ return i === zoneIdx ? z.concat([tile]) : z; });
  var newPlacements = {
    count: state.roundPlacements.count - 1,
    zones: state.roundPlacements.zones.map(function(v, i){ return i === zoneIdx ? false : v; })
  };
  state = Object.assign({}, state, { zones: newZones, log: newLog, roundPlacements: newPlacements });
  save(); render();
}

function requestReset(){ ui.confirmReset = true; render(); }
function cancelReset(){ ui.confirmReset = false; render(); }
function doReset(){
  try { localStorage.removeItem(STORAGE_KEY); } catch(e) {}
  state = null; undoStack = [];
  ui = { showLog:false, showMenu:false, showLangMenu:false, confirmReset:false, confirmFinish:false, setupPlayers:4 };
  render();
}

function requestFinish(){ ui.confirmFinish = true; render(); }
function cancelFinish(){ ui.confirmFinish = false; render(); }
function doFinish(){
  pushUndo();
  state = Object.assign({}, state, { finished:true });
  ui.confirmFinish = false;
  save(); render();
}

function toggle(key){ ui[key] = !ui[key]; render(); }
function setSetupPlayers(p){ ui.setupPlayers = p; render(); }

function renderSetup(){
  var opts = [2,3,4,5].map(function(p){
    return '<button class="player-btn' + (ui.setupPlayers===p ? ' active' : '') + '" onclick="setSetupPlayers(' + p + ')">' + p + '</button>';
  }).join('');
  return '' +
  '<div class="setup">' +
    '<div class="disp" style="font-size:1.7rem;font-weight:700;">Tipperary</div>' +
    '<div style="color:var(--text-dim);font-size:.82rem;margin-top:.3rem;">' + t('app_subtitle') + '</div>' +
    '<div style="margin-top:.7rem;"><span onclick="toggle(\'showLangMenu\')" style="font-size:.72rem;color:var(--text-dim);cursor:pointer;text-decoration:underline;">🌐 ' + LANG_LABELS[currentLang] + '</span></div>' +
    '<div style="margin-top:1.4rem;font-size:.82rem;color:var(--text-dim);">' + t('players_label') + '</div>' +
    '<div class="players-row">' + opts + '</div>' +
    '<button class="btn btn-primary" style="width:100%;justify-content:center;padding:.7rem;" onclick="startGame(' + ui.setupPlayers + ')">' + t('start_btn') + '</button>' +
    '<div style="margin-top:1rem;font-size:.7rem;color:var(--text-dim);">' + (ui.setupPlayers===5 ? t('rounds_5') : t('rounds_other')) + ' ' + t('tile_note') + '</div>' +
    '<div style="margin-top:1rem;font-size:.65rem;color:var(--text-dim);opacity:.75;">' + t('disclaimer') + '</div>' +
  '</div>';
}

function renderFinish(){
  return '' +
  '<div class="finish">' +
    '<h2 class="disp">' + t('finish_title') + '</h2>' +
    '<p style="color:var(--text-dim);font-size:.86rem;">' + t('finish_intro') + '</p>' +
    '<ul>' +
      '<li><b>' + t('cat_rect_t') + '</b> — ' + t('cat_rect_d') + '</li>' +
      '<li><b>' + t('cat_sheep_t') + '</b> — ' + t('cat_sheep_d') + '</li>' +
      '<li><b>' + t('cat_explore_t') + '</b> — ' + t('cat_explore_d') + '</li>' +
      '<li><b>' + t('cat_flour_t') + '</b> — ' + t('cat_flour_d') + '</li>' +
      '<li><b>' + t('cat_stones_t') + '</b> — ' + t('cat_stones_d') + '</li>' +
    '</ul>' +
    '<button class="btn btn-primary" style="width:100%;justify-content:center;margin-top:.5rem;" onclick="requestReset()">' + t('new_game_btn') + '</button>' +
    '<div style="margin-top:.9rem;text-align:center;"><span onclick="toggle(\'showLangMenu\')" style="font-size:.72rem;color:var(--text-dim);cursor:pointer;text-decoration:underline;">🌐 ' + LANG_LABELS[currentLang] + '</span></div>' +
  '</div>';
}

function renderTopbar(){
  return '' +
  '<div class="topbar">' +
    '<div class="topbar-title disp">Tipperary <span class="topbar-sub">' + t('topbar_players', {n:state.players}) + '</span></div>' +
    '<div class="spacer"></div>' +
    '<button class="icon-btn" onclick="toggle(\'showLog\')" title="' + t('title_history') + '">☰</button>' +
    '<button class="icon-btn" onclick="toggle(\'showMenu\')" title="' + t('title_more') + '">⋯</button>' +
  '</div>';
}

function renderRoundAction(){
  var roundLabel = t('round_word') + ' ' + state.round + '/' + state.totalRounds;
  if (state.round >= state.totalRounds){
    return '<button class="btn round-advance-btn" disabled>' + t('round_last', {round:roundLabel}) + '</button>';
  }
  var have = state.roundPlacements.count;
  var need = state.players;
  if (have !== need){
    var remaining = need - have;
    return '<button class="btn round-advance-btn warn" disabled>' + t('round_warn', {round:roundLabel, have:have, need:need, remaining:remaining}) + '</button>';
  }
  return '<button class="btn btn-primary round-advance-btn" onclick="newRound()">' + t('round_ready', {round:roundLabel}) + '</button>';
}

function renderZones(){
  var freshTiles = {};
  (state.lastDraw || []).forEach(function(d){ freshTiles[d.zone + ':' + d.tile] = true; });
  var cards = state.zones.map(function(tiles, zi){
    var zoneClosed = state.roundPlacements.zones[zi];
    var ticketsHTML = tiles.length === 0
      ? '<div class="empty-slot">' + t('zone_empty') + '</div>'
      : tiles.map(function(t){
          var isNew = !!freshTiles[zi + ':' + t];
          var cls = 'ticket' + (isNew ? ' new' : '') + (zoneClosed ? ' locked' : '');
          var tap = zoneClosed ? '' : ' onclick="handlePlace(' + zi + ',' + t + ')"';
          var sub = isNew ? '<span class="new-badge">★</span>' : '';
          return '<div class="' + cls + '"' + tap + '><span class="n">n°' + t + '</span>' + sub + '</div>';
        }).join('');
    return '' +
    '<div class="zone' + (zoneClosed ? ' closed' : '') + '" style="--zc:' + ZONE_COLORS[zi] + '"' + (zoneClosed ? ' onclick="cancelPlacement(' + zi + ')"' : '') + '>' +
      '<h3><span class="zone-icon">' + ZONE_ICONS[zi] + '</span>' + ZONE_NAMES[zi] + (zoneClosed ? '<span class="check">↺</span>' : '') + '</h3>' +
      '<div class="tickets">' + ticketsHTML + '</div>' +
    '</div>';
  }).join('');
  return '<div class="zones">' + cards + '</div>';
}

function renderModals(){
  var html = '';
  if (ui.showLog){
    var items = state.log.slice().reverse().map(function(e){
      return '<div class="log-item">M' + e.round + ' · ' + ZONE_NAMES[e.zone] + ' · n°' + e.tile + ' · ' + (e.action==='draw' ? t('log_drawn') : t('log_placed')) + '</div>';
    }).join('');
    html += '' +
    '<div class="modal-backdrop"><div class="modal wide">' +
      '<div class="disp" style="font-size:1.05rem;font-weight:700;margin-bottom:.5rem;">' + t('title_history') + '</div>' +
      '<div class="modal-log">' + (state.log.length===0 ? t('log_empty') : items) + '</div>' +
      '<div class="modal-actions"><button class="btn btn-primary" onclick="toggle(\'showLog\')">' + t('btn_close') + '</button></div>' +
    '</div></div>';
  }
  if (ui.showMenu){
    html += '' +
    '<div class="modal-backdrop"><div class="modal">' +
      '<div class="disp" style="font-size:1.05rem;font-weight:700;margin-bottom:.8rem;">' + t('title_more') + '</div>' +
      '<div class="modal-menu-list">' +
        '<button class="btn" onclick="toggle(\'showMenu\');handleUndo()" ' + (undoStack.length===0?'disabled':'') + '>' + t('menu_undo') + '</button>' +
        '<button class="btn" onclick="toggle(\'showMenu\');toggle(\'showLangMenu\')">🌐 ' + t('title_lang') + '</button>' +
        '<button class="btn" onclick="toggle(\'showMenu\');requestFinish()">' + t('menu_finish') + '</button>' +
        '<button class="btn btn-danger" onclick="toggle(\'showMenu\');requestReset()">' + t('menu_reset') + '</button>' +
      '</div>' +
      '<div class="modal-actions"><button class="btn" onclick="toggle(\'showMenu\')">' + t('btn_close') + '</button></div>' +
    '</div></div>';
  }
  if (ui.showLangMenu){
    var langBtns = LANGS.map(function(code){
      return '<button class="btn' + (code===currentLang?' btn-primary':'') + '" onclick="setLang(\'' + code + '\')">' + LANG_FLAGS[code] + ' ' + LANG_LABELS[code] + '</button>';
    }).join('');
    html += '' +
    '<div class="modal-backdrop"><div class="modal">' +
      '<div class="disp" style="font-size:1.05rem;font-weight:700;margin-bottom:.8rem;">' + t('title_lang') + '</div>' +
      '<div class="modal-menu-list">' + langBtns + '</div>' +
      '<div class="modal-actions"><button class="btn" onclick="toggle(\'showLangMenu\')">' + t('btn_close') + '</button></div>' +
    '</div></div>';
  }
  if (ui.confirmReset){
    html += '' +
    '<div class="modal-backdrop"><div class="modal">' +
      '<div class="disp" style="font-size:1.1rem;font-weight:700;">' + t('reset_title') + '</div>' +
      '<p>' + t('reset_body') + '</p>' +
      '<div class="modal-actions">' +
        '<button class="btn" onclick="cancelReset()">' + t('btn_cancel') + '</button>' +
        '<button class="btn btn-danger" onclick="doReset()">' + t('btn_confirm_reset') + '</button>' +
      '</div>' +
    '</div></div>';
  }
  if (ui.confirmFinish){
    html += '' +
    '<div class="modal-backdrop"><div class="modal">' +
      '<div class="disp" style="font-size:1.1rem;font-weight:700;">' + t('finish_confirm_title') + '</div>' +
      '<p>' + t('finish_confirm_body') + '</p>' +
      '<div class="modal-actions">' +
        '<button class="btn" onclick="cancelFinish()">' + t('btn_cancel') + '</button>' +
        '<button class="btn btn-primary" onclick="doFinish()">' + t('btn_confirm_finish') + '</button>' +
      '</div>' +
    '</div></div>';
  }
  return html;
}

var hintDismissed = false;
try { hintDismissed = localStorage.getItem('tipperary_hint_seen') === '1'; } catch(e) {}
function dismissHint(){
  hintDismissed = true;
  try { localStorage.setItem('tipperary_hint_seen', '1'); } catch(e) {}
  render();
}
function renderHintBanner(){
  if (hintDismissed) return '';
  return '<div class="hint-banner">📲 ' + t('hint_text') + '<button class="hint-close" onclick="dismissHint()">✕</button></div>';
}

function render(){
  var app = document.getElementById('app');
  if (!state){
    app.innerHTML = renderHintBanner() + renderSetup() + renderModals();
    return;
  }
  if (state.finished){
    app.innerHTML = renderHintBanner() + renderFinish() + renderModals();
    return;
  }
  app.innerHTML = renderHintBanner() + renderTopbar() + renderRoundAction() + renderZones() + renderModals();
}

function normalizeState(s){
  if (!s) return s;
  if (!s.lastDraw) s.lastDraw = [];
  if (!s.roundPlacements || !Array.isArray(s.roundPlacements.zones) || s.roundPlacements.zones.length !== ZONE_COUNT){
    var zones = [false,false,false,false,false];
    var count = 0;
    (s.log || []).forEach(function(e){
      if (e.action === 'place' && e.round === s.round){ zones[e.zone] = true; count++; }
    });
    s.roundPlacements = { count: count, zones: zones };
  }
  return s;
}

// init
state = normalizeState(load());
document.documentElement.lang = currentLang;
render();

// offline badge
function updateOnlineBadge(){
  var b = document.getElementById('offlineBadge');
  b.textContent = t('offline_text');
  b.style.display = navigator.onLine ? 'none' : 'block';
}
window.addEventListener('online', updateOnlineBadge);
window.addEventListener('offline', updateOnlineBadge);
updateOnlineBadge();

// service worker for offline use
if ('serviceWorker' in navigator){
  window.addEventListener('load', function(){
    navigator.serviceWorker.register('service-worker.js').catch(function(){});
  });
}
</script>
